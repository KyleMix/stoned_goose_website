name: IndexNow ping

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "content/**"
      - "public/**"
  workflow_dispatch:

jobs:
  ping:
    name: Ping IndexNow
    runs-on: ubuntu-latest
    if: ${{ secrets.INDEXNOW_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Build URL list from changed paths
        id: urls
        run: |
          # Map changed app/<route>/page.tsx files back to public URLs.
          # Anything else gets the homepage as a fallback ping.
          changed=$(git diff --name-only HEAD~1 HEAD || true)
          urls=$(echo "$changed" | awk '
            /^app\/page.tsx/ { print "https://www.stonedgooseproductions.com/" }
            /^app\/(.+)\/page\.tsx$/ {
              sub(/^app\//, "", $0); sub(/\/page\.tsx$/, "", $0);
              print "https://www.stonedgooseproductions.com/" $0
            }
          ' | sort -u)
          if [ -z "$urls" ]; then
            urls="https://www.stonedgooseproductions.com/"
          fi
          {
            echo 'list<<EOF'
            echo "$urls"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Ping IndexNow
        env:
          KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          urls='${{ steps.urls.outputs.list }}'
          payload=$(jq -nc --arg host "www.stonedgooseproductions.com" \
            --arg key "$KEY" \
            --arg keyLocation "https://www.stonedgooseproductions.com/$KEY.txt" \
            --argjson urls "$(echo "$urls" | jq -R -s 'split("\n") | map(select(length > 0))')" \
            '{host:$host, key:$key, keyLocation:$keyLocation, urlList:$urls}')
          echo "$payload"
          curl -fsS -X POST -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload" https://api.indexnow.org/IndexNow
