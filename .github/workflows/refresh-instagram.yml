name: Refresh Instagram feed

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Pull latest IG posts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run sync:instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_MAX_RESULTS: ${{ vars.INSTAGRAM_MAX_RESULTS }}
      - name: Open PR if feed changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh Instagram feed"
          branch: bot/instagram-refresh
          title: "Refresh Instagram feed"
          body: |
            Automated refresh from `npm run sync:instagram`.
            Review the diff and merge if it looks right. Token rotation
            details live in the README "Integration cheat sheet" section.
          add-paths: content/.generated/instagram.json
          delete-branch: true
